<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>very simple yt downloader</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha384-3B6NwesSXE7YJlcLI9RpRqGf2p/EgVH8BgoKTaUrmKNDkHPStTQ3EyoYjCGXaOTS"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <main class="container">
      <section class="card" aria-label="yt-dlp downloader">
        <header class="head">
          <h1>very simple yt downloader</h1>
          <p class="subtitle">
            made to be as simple as possible. just downloads stuff,
            not more, not less.
          </p>
        </header>

        <div class="field">
          <label class="field-label" for="urlInput">Source link</label>
          <div class="input-group url-group">
            <i class="fas fa-link input-icon" aria-hidden="true"></i>
            <input
              type="text"
              id="urlInput"
              placeholder="paste a video URL…"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              required
            />
          </div>
        </div>

        <div class="field">
          <span class="field-label" id="formatLabel">Format</span>
          <div class="options" role="radiogroup" aria-labelledby="formatLabel">
            <label class="radio-container">
              <input type="radio" name="format" value="mp3" checked />
              <span class="radio-label">
                <i class="fas fa-music" aria-hidden="true"></i>
                <span class="radio-text">MP3 <small>audio</small></span>
              </span>
            </label>
            <label class="radio-container">
              <input type="radio" name="format" value="mp4" />
              <span class="radio-label">
                <i class="fas fa-film" aria-hidden="true"></i>
                <span class="radio-text">MP4 <small>video</small></span>
              </span>
            </label>
          </div>
        </div>

        <div id="qualityGroup" class="field hidden">
          <label class="field-label" for="qualitySelect">Max quality</label>
          <div class="input-group select-group">
            <i class="fas fa-sliders-h input-icon" id="qualityIcon" aria-hidden="true"></i>
            <div class="input-spinner hidden" id="qualitySpinner" aria-hidden="true"></div>
            <select id="qualitySelect">
              <option value="best">Best Quality</option>
              <option value="2160">4K (2160p)</option>
              <option value="1440">2K (1440p)</option>
              <option value="1080">1080p</option>
              <option value="720">720p</option>
              <option value="480">480p</option>
            </select>
            <i class="fas fa-chevron-down select-caret" aria-hidden="true"></i>
          </div>
          <p id="videoInfo" class="video-info hidden" role="status"></p>
        </div>

        <button id="downloadBtn">
          <span id="btnFill"></span>
          <span id="btnText">Download</span>
          <i class="fas fa-arrow-down-long" id="btnIcon" aria-hidden="true"></i>
        </button>

        <div id="cancelRow" class="cancel-row hidden">
          <button id="cancelBtn"><i class="fas fa-xmark"></i> Cancel</button>
        </div>

        <div id="noticeContainer" class="notice-container hidden" role="status">
          <i class="fas fa-circle-info" aria-hidden="true"></i>
          <span id="noticeMessage"></span>
        </div>

        <div id="errorContainer" class="error-container hidden" role="alert">
          <i class="fas fa-triangle-exclamation" aria-hidden="true"></i>
          <span id="errorMessage"></span>
        </div>
      </section>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
