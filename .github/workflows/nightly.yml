name: Nightly Build

on:
  schedule:
    - cron: "0 2 * * *"  # daily at 02:00 UTC
  workflow_dispatch:  # manual trigger

permissions:
  # write needed: the workflow commits the yt-dlp version bump back to main
  contents: write
  packages: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest yt-dlp version from PyPI
        id: ytdlp
        run: |
          # PyPI, not GitHub releases: a release can appear on GitHub before it is
          # installable via pip, which would break the image build. PyPI also uses
          # the same normalized version format as requirements.txt (2026.3.17,
          # not the zero-padded git tag 2026.03.17).
          LATEST=$(curl -s https://pypi.org/pypi/yt-dlp/json | jq -r '.info.version')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current yt-dlp version from requirements.txt
        id: current
        run: |
          CURRENT=$(grep '^yt-dlp==' requirements.txt | sed 's/yt-dlp==//')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.ytdlp.outputs.latest }}" != "${{ steps.current.outputs.current }}" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New yt-dlp version available: ${{ steps.ytdlp.outputs.latest }} (current: ${{ steps.current.outputs.current }})"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "yt-dlp is up to date (${{ steps.current.outputs.current }})"
          fi

      - name: Update requirements.txt
        if: steps.compare.outputs.update_needed == 'true'
        run: |
          sed -i "s/^yt-dlp==.*/yt-dlp==${{ steps.ytdlp.outputs.latest }}/" requirements.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update yt-dlp to ${{ steps.ytdlp.outputs.latest }}"
          git push

      - name: Set up Docker Buildx
        if: steps.compare.outputs.update_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.compare.outputs.update_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.compare.outputs.update_needed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.compare.outputs.update_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/yt-dlp-web-gui:latest
            ghcr.io/${{ github.repository_owner }}/yt-dlp-web-gui:${{ steps.ytdlp.outputs.latest }}
            ${{ secrets.DOCKERHUB_USERNAME }}/yt-dlp-web-gui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/yt-dlp-web-gui:${{ steps.ytdlp.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
